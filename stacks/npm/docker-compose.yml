---
# Nginx Proxy Manager
# Reverse proxy + Let's Encrypt + admin UI
# - 80/443: bound to all interfaces (must accept from WAN via UCG NAT)
# - 81 (admin UI): bound to LAN IP only (NEVER expose admin to internet)

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"                # HTTP (also used for LE HTTP-01 challenge)
      - "0.0.0.0:443:443"               # HTTPS
      - "192.168.40.40:81:81"           # admin UI - LAN ONLY
    environment:
      - DISABLE_IPV6=true
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
    name: proxy
