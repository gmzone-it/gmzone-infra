---
# homehunter — deploy stack
#
# Two containers, two networks:
#   - app  : Next.js standalone (ghcr.io/giagione9/gmzone-it-homehunter)
#            attached to BOTH 'proxy' (for NPM ingress) and 'homehunter-internal'
#   - db   : Postgres 16 + PostGIS, only on 'homehunter-internal'
#
# Migrations Prisma run automatically at container boot via docker-entrypoint.sh
#
# Hardening pattern as in gmzone-infra/stacks/{demo-hello, uptime-kuma}/:
#   - non-root user (UID 10001 inside the image)
#   - dropped capabilities, no-new-privileges
#   - mem/cpu limits, healthcheck on /api/health
#
# Auth: solo Email magic link via SMTP register.it (admin@gmzone.it)

services:

  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: homehunter-db
    restart: unless-stopped
    networks:
      - homehunter-internal
    environment:
      POSTGRES_DB: homehunter
      POSTGRES_USER: homehunter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var required}
      POSTGRES_INITDB_ARGS: "--locale=it_IT.UTF-8 --encoding=UTF-8"
      LANG: it_IT.utf8
    volumes:
      - pgdata:/var/lib/postgresql/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_READ_SEARCH
      - FOWNER
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homehunter -d homehunter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    image: ghcr.io/giagione9/gmzone-it-homehunter:${IMAGE_TAG:-latest}
    container_name: homehunter
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy
      - homehunter-internal
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

      # --- Database ---
      DATABASE_URL: "postgresql://homehunter:${POSTGRES_PASSWORD}@db:5432/homehunter?schema=public"

      # --- NextAuth ---
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET env var required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://homehunter.gmzone.it}

      # --- Email magic link (SMTP register.it) ---
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-authsmtp.securemail.pro}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-465}
      EMAIL_SERVER_SECURE: ${EMAIL_SERVER_SECURE:-true}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:?EMAIL_SERVER_USER env var required}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:?EMAIL_SERVER_PASSWORD env var required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM env var required}

      # --- OpenRouteService ---
      ORS_API_KEY: ${ORS_API_KEY:?ORS_API_KEY env var required}

      # --- Feature flags ---
      NEXT_PUBLIC_ENABLE_ISOCHRONES: "true"

    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /app/.next/cache:size=128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
    name: proxy
  homehunter-internal:
    driver: bridge

volumes:
  pgdata:
    name: homehunter_pgdata
