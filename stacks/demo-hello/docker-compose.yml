---
# Demo "hello" page - first published service
# - serves a simple static page on port 80
# - NO port mapping to host (no exposed port on the LAN/WAN)
# - reachable ONLY via NPM through the shared 'proxy' network
#   (this is the security pattern for ALL future apps)
# - hardened: read-only filesystem, dropped caps, non-root user, mem/cpu limits

services:
  hello:
    image: nginxdemos/hello:plain-text
    container_name: hello
    restart: unless-stopped
    networks:
      - proxy
    read_only: true
    tmpfs:
      - /tmp:size=8M
      - /var/cache/nginx:size=16M
      - /var/run:size=4M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25

networks:
  proxy:
    external: true
    name: proxy
